services:

  # ── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - chunk_store:/var/lib/novahyper/chunks
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "dev-secret-change-in-production-minimum-32-chars"
      DATABASE_URL: "postgresql+asyncpg://novahyper:novahyper@postgres:5432/novahyper"
      NATS_URL: "nats://nats:4222"
      LIBVIRT_URI: "test:///default"           # Mock libvirt — no KVM needed for dev
      DEDUP_STORE_PATH: "/var/lib/novahyper/chunks"
      ENVIRONMENT: "development"
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
      BOOTSTRAP_ADMIN_EMAIL: "jherring@m-theorygrp.com"
      BOOTSTRAP_ADMIN_PASSWORD: "changeme123!"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_DB: novahyper
      POSTGRES_USER: novahyper
      POSTGRES_PASSWORD: novahyper
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novahyper -d novahyper"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── NATS JetStream ────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "novahyper-nats"]
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats_data:/data

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana (optional — comment out if not needed) ─────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── MinIO (S3-compatible chunk store for dev) ──────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: novahyper
      MINIO_ROOT_PASSWORD: novahyper123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nats_data:
  prometheus_data:
  grafana_data:
  minio_data:
  chunk_store:
